<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirection...</title>
  <script>
    // Détection de la langue principale du navigateur
    const lang = navigator.language || navigator.userLanguage;

    // Extraction du code de langue (ex : "fr", "en", "es", etc.)
    const shortLang = lang.substring(0, 2).toLowerCase();

    // Dictionnaire de redirection selon la langue
    const redirects = {
      fr: "mosn221.github.io/fr/index.html",
      en: "mosn221.github.io/en/index.html",
    };

    // Redirection si la langue est reconnue, sinon redirection par défaut (en)
    const target = redirects[shortLang] || "mosn221.github.io/en/index.html";
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Redirection en cours... Si vous n'êtes pas redirigé automatiquement, <a href="mosn221.github.io/en/index.html">cliquez ici</a>.</p>
</body>
</html>
